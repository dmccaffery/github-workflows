# Caller workflow — copy to `.github/workflows/dependabot-dist.yaml` in a JavaScript/
# TypeScript Action repo that commits its bundled dist/ and whose CI fails when the
# committed dist/ is stale. Dependabot bumps a bundled dependency but cannot run the
# build, so its PR lands with a stale dist/ and CI goes red — and Dependabot auto-merge
# waits for green, so the PR would stick.
#
# How it works: when your CI FAILS on a `dependabot/` branch, the reusable workflow checks
# out the PR head, runs `make build`, and — only if dist/ changed — commits the rebuilt
# bundle back to the PR branch as the "FF Merge" App. That push re-triggers CI, which now
# reproduces dist/ and goes green. It does NOT approve or merge: the rebuild commit makes
# the head a non-Dependabot commit, so a human approves the (production-dependency) bump
# and your existing Dependabot auto-merge (dependabot-merge.yaml) squash-merges it. Dev-only
# bumps never touch dist/, so they never fail CI, never reach this workflow, and keep
# auto-merging.
#
# Requires the same prerequisites as dependabot-merge.yaml:
#   - org variable FF_MERGE_CLIENT_ID and org secret FF_MERGE_PRIVATE_KEY
#   - the "FF Merge" App installed on this repo, with contents:write, in main's ruleset
#     bypass list
#
# Pin @v4 to a release tag or full commit SHA — see README "Pinning".
name: Dependabot Dist Rebuild

# workflow_run on your CI workflow's completion — the reusable workflow filters to FAILED
# runs on dependabot/ branches, so pushes to main and green runs are ignored. Name the CI
# workflow whose dist/ gate fails on a stale bundle (the same one dependabot-merge waits on).
on:
  workflow_run:
    workflows: ["CI"] # replace with your CI workflow name
    types: [completed]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  rebuild-dist:
    uses: bitwise-media-group/github-workflows/.github/workflows/dependabot-dist.yaml@v4
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
      # node-version-file: .node-version # default
      # paths: dist # default; space-separated for more than one output path
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
