# Caller workflow — copy to `.github/workflows/codeql.yaml` in a Go repo. It owns
# the triggers and grants the analyze permissions; the reusable codeql-go
# workflow scans actions (build-free) + go (autobuild; setup-go matches go.mod).
#
# Pin @v1 to a release tag or full commit SHA — see README "Pinning".

name: CodeQL analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]
  schedule:
    - cron: "28 20 * * 4"

# ceiling for the reusable workflow's analyze job
permissions:
  # upload analysis results to code scanning
  security-events: write
  # fetch internal or private CodeQL packs
  packages: read
  # only required for workflows in private repositories
  actions: read
  # check out the repository
  contents: read

jobs:
  analyze:
    uses: bitwise-media-group/github-workflows/.github/workflows/codeql-go.yaml@v1
    # with:
    #   go-version-file: go.mod                          # default
    #   config-file: ./.github/codeql/codeql-config.yaml # if you have one
