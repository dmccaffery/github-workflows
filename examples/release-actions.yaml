# Caller workflow — copy to `.github/workflows/release.yaml` in a GitHub Actions
# repo. It owns the push trigger and grants the release permissions; the reusable
# release-actions workflow runs release-please and, on a release, rebuilds dist/ and
# moves the floating major tag. The repo must provide release-please-config.json
# + .release-please-manifest.json, an `npm run all` build, and a .node-version.
#
# Pin @v1 to a release tag or full commit SHA — see README "Pinning".

name: Release

on:
  push:
    branches: [main]

# ceiling for the reusable workflow's release-please + publish jobs
permissions:
  # create the release, tag, and move the major tag
  contents: write
  # release-please creates pr labels via the issues api
  issues: write
  # release-please opens the release pull request
  pull-requests: write

jobs:
  release:
    uses: bitwise-media-group/github-workflows/.github/workflows/release-actions.yaml@v1
