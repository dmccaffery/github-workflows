# Caller workflow — copy to `.github/workflows/ci.yaml` in a Go repo. It owns the
# push/pull_request triggers; all the work lives in the reusable ci-go workflow.
# The repo must provide a Makefile with targets build / vet / test-coverage
# (emitting cobertura-coverage.xml) / vuln / lint-md / fmt-check, plus go.mod and
# a package.json for the node-based doc linters.
#
# Add product-specific jobs (integration, e2e, ...) alongside the `ci` job here;
# a caller can mix a reusable-workflow job with normal jobs.
#
# Pin @v1 to a release tag or full commit SHA — see README "Pinning".

name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
  contents: read

jobs:
  ci:
    uses: bitwise-media-group/github-workflows/.github/workflows/ci-go.yaml@v1
    # with:
    #   # default is go.sum; list every lockfile that affects the build
    #   cache-dependency-path: |
    #     go.sum
    #     tools/go.sum
    #     e2e/go.sum
