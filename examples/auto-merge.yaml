# Caller workflow — copy to `.github/workflows/auto-merge.yaml` in a consuming repo
# to enable set-and-forget fast-forward merges.
#
# How it works: a maintainer arms a PR once — comments `/auto-merge`, or adds the
# `auto-merge` label — and the reusable workflow fast-forwards it automatically as
# soon as it is approved and every required check is green (preserving each commit's
# signature, via the same `ff-merge` action as the `/merge` flow). Remove the label
# to cancel. This is the companion to `merge.yaml`: `/merge` merges now, `/auto-merge`
# merges when ready.
#
# Requires branch protection that requires PR review (so the approval sets the review
# decision) — the same assumption as the `/merge` and Dependabot flows.
#
# Prerequisites (one-time, org-wide — see bitwise-media-group/ff-merge):
#   - org variable FF_MERGE_CLIENT_ID and org secret FF_MERGE_PRIVATE_KEY
#   - the "FF Merge" App installed on this repo and in the ruleset bypass list
#
# Pin @v1 to a release tag or full commit SHA — see README "Pinning".
name: Auto-merge

# All four triggers are required; each is handled by one job in the reusable
# workflow. issue_comment + pull_request_target(labeled) arm the PR;
# pull_request_review(approved) and workflow_run(completed) attempt the merge once
# the state changes. List in `workflows:` every workflow that must pass before
# merging — whichever finishes last triggers the attempt, and ff-merge re-verifies
# all checks. pull_request_target / pull_request_review are safe here: the reusable
# workflow never checks out or runs PR code.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ["CI"] # replace with your CI workflow name(s) — all that must be green
    types: [completed]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  auto-merge:
    uses: bitwise-media-group/github-workflows/.github/workflows/auto-merge.yaml@v1
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
      # label: auto-merge   # default — the label that arms auto-merge
      # command: /auto-merge # default — the comment that arms auto-merge
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
