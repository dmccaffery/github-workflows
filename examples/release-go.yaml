# Caller workflow — copy to `.github/workflows/release.yaml` in a Go repo. It
# owns the push trigger and grants the release permissions; the reusable
# release-go workflow runs release-please (two-pass) then GoReleaser (archives,
# checksums, SBOMs, cosign signatures, optional Homebrew cask, SLSA attestation).
# The repo must provide release-please-config.json (release-type: go, draft: true)
# + .release-please-manifest.json, a .goreleaser.yaml, and go.mod.
#
# Pin @v1 to a release tag or full commit SHA — see README "Pinning".

name: Release

on:
  push:
    branches: [main]

# ceiling for the reusable workflow's release-please + goreleaser jobs
permissions:
  # create the release/tag and upload assets
  contents: write
  # release-please creates pr labels via the issues api
  issues: write
  # release-please opens the release pull request
  pull-requests: write
  # cosign keyless signing
  id-token: write
  # github build-provenance attestation
  attestations: write
  # artifact storage record for the attestation
  artifact-metadata: write

jobs:
  release:
    uses: bitwise-media-group/github-workflows/.github/workflows/release-go.yaml@v1
    secrets:
      # optional — only needed if .goreleaser.yaml pushes a Homebrew cask to another repo
      homebrew-tap-token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
