# Caller workflow — copy to `.github/workflows/merge-review-ack.yaml` in a consuming
# repo. It closes the fork-PR auto-merge gap: an approval on a fork PR carries no
# secrets, so the review path in merge.yaml can't merge it directly, and if CI was
# already green the approval is the last event — nothing else fires to finish the
# merge. This workflow completes on an approving review purely so its
# workflow_run(completed) fires in the base-repo context, where merge.yaml's
# `merge-on-review-completed` job mints the App token and retries the fast-forward.
# Harmless for same-repo PRs (those merge via the review path directly).
#
# Wire-up: add this workflow's name ("Merge Review Ack") to the `workflow_run.workflows`
# list in your merge.yaml caller, alongside your CI workflow name(s). No secret needed —
# it does no privileged work; the completed run is the only signal.
#
# Pin @v2 to a release tag or full commit SHA — see README "Pinning".

name: Merge Review Ack

on:
  pull_request_review:
    types: [submitted]

# does no privileged work; grants nothing
permissions: {}

jobs:
  ack:
    uses: bitwise-media-group/github-workflows/.github/workflows/merge-review-ack.yaml@v2
