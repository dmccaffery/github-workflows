# Caller workflow — copy to `.github/workflows/dependabot-merge.yaml` in a
# consuming repo to auto-approve and squash-merge Dependabot's minor/patch PRs.
#
# How it works: when a Dependabot PR's CI finishes green this approves it if it is a
# minor or patch update, then squash-merges it into the base branch once every check
# on its head is green (squash, not fast-forward, so queued Dependabot PRs merge
# without a rebase — and a CI rerun — between each one; the App's ruleset bypass
# covers the rebase-only merge-method rule). Major updates are never approved, so
# they wait for a human.
#
# Requires a `.github/dependabot.yaml` so Dependabot opens PRs, and branch
# protection that requires PR review (so the approval sets the review decision) —
# the same assumption as the `/merge` flow.
#
# Prerequisites (one-time, org-wide — see bitwise-media-group/ff-merge):
#   - org variable FF_MERGE_CLIENT_ID and org secret FF_MERGE_PRIVATE_KEY
#   - the "FF Merge" App installed on this repo and in the ruleset bypass list
#
# Pin @v2 to a release tag or full commit SHA — see README "Pinning".
name: Dependabot Auto-Merge

# Just workflow_run — the reusable workflow approves and squash-merges once CI is green,
# reading the minor/patch-vs-major policy from Dependabot's signed commit. This event
# does NOT attach a check run to the PR, so it leaves no skipped-job clutter (and needs
# no pull_request_target). check_suite is NOT usable — GitHub does not fire it for a
# repo's own Actions CI. List in `workflows:` every workflow that must pass before
# merging; whichever finishes last triggers the merge attempt.
on:
  workflow_run:
    workflows: ["CI"] # replace with your CI workflow name(s) — all that must be green
    types: [completed]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  auto-merge:
    uses: bitwise-media-group/github-workflows/.github/workflows/dependabot-merge.yaml@v2
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
      # update-types: '["version-update:semver-patch", "version-update:semver-minor"]' # default
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
