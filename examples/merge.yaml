# Caller workflow — copy to `.github/workflows/merge.yaml` in a consuming repo to
# enable both fast-forward merge flows: manual `/merge` and set-and-forget
# auto-merge. `/merge` merges an approved, green PR now; `/auto-merge` (or adding the
# `auto-merge` label) arms it to merge automatically once approved and green. Both
# preserve every commit signature via the same `ff-merge` action.
#
# Every trigger here is one that does NOT attach a check run to the PR's head commit
# (issue_comment, workflow_run, schedule), so the merge machinery leaves no skipped-job
# clutter on the PR's checks list. The approval signal is captured separately by the
# companion merge-review-ack.yaml (whose single job is the only check the system adds to
# a PR) and re-enters via workflow_run. None of these run PR code or use
# pull_request_target. A repo that only wants `/merge` can trigger just `issue_comment`.
#
# Install the companion examples/merge-review-ack.yaml and keep "Merge Review Ack" in the
# workflow_run list below — that is what makes approvals (fork and same-repo) complete the
# merge promptly. The scheduled sweep backstops any missed trigger.
#
# Requires branch protection that requires PR review (so the approval sets the review
# decision).
#
# Prerequisites (one-time, org-wide — see bitwise-media-group/ff-merge):
#   - org variable FF_MERGE_CLIENT_ID and org secret FF_MERGE_PRIVATE_KEY
#   - the "FF Merge" App installed on this repo and in the ruleset bypass list
#
# Pin @v2 to a release tag or full commit SHA — see README "Pinning".
name: Merge

# issue_comment drives `/merge` and arms `/auto-merge`; workflow_run(completed) attempts
# the auto-merge once the PR is approved and green; the schedule sweeps armed PRs as a
# backstop. List in `workflows:` every workflow that must pass PLUS "Merge Review Ack"
# (the companion caller that turns an approval into a merge attempt) — whichever finishes
# last triggers the attempt, and ff-merge re-verifies all checks.
on:
  issue_comment:
    types: [created]
  workflow_run:
    # replace "CI" with your CI workflow name(s) — every check that must be green.
    # Keep "Merge Review Ack" (examples/merge-review-ack.yaml) so an approval completes
    # the auto-merge — for fork and same-repo PRs alike.
    workflows: ["CI", "Merge Review Ack"]
    types: [completed]
  schedule:
    # Backstop sweep of armed PRs for any missed event trigger. Tune the cadence or
    # remove it if the event paths above are sufficient for your repo.
    - cron: "17 * * * *"

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  merge:
    uses: bitwise-media-group/github-workflows/.github/workflows/merge.yaml@v2
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
      # merge-command: /merge     # default — the comment that merges now
      # arm-command: /auto-merge  # default — the comment that arms auto-merge
      # label: auto-merge         # default — the label that arms auto-merge
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
