# Caller workflow — copy to `.github/workflows/codeql.yaml` in a Node repo. It
# owns the triggers and grants the analyze permissions; the reusable codeql-node
# workflow scans actions + javascript-typescript (build-free).
#
# Pin @v1 to a release tag or full commit SHA — see README "Pinning".

name: CodeQL analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]
  schedule:
    - cron: "28 20 * * 4"

# ceiling for the reusable workflow's analyze job
permissions:
  # upload analysis results to code scanning
  security-events: write
  # fetch internal or private CodeQL packs
  packages: read
  # only required for workflows in private repositories
  actions: read
  # check out the repository
  contents: read

jobs:
  analyze:
    uses: bitwise-media-group/github-workflows/.github/workflows/codeql-node.yaml@v1
    with:
      # a repo with a bundled dist/ should exclude it (copy examples/codeql-config.yaml):
      config-file: ./.github/codeql/codeql-config.yaml
