# Keep the SHA-pinned actions in the reusable workflows fresh. github-actions bumps reach
# consumers pinned to our SHAs/tags, so they ship as `fix` and cut a release-please patch
# that trickles the update out; `deps` never would (it is not a recognised type, so
# release-please ignores it). The dev toolchain (prettier, markdownlint-cli2, addlicense,
# actionlint, zizmor) is pinned in the root mise.toml + mise.lock, which Dependabot does
# not understand -- bump those pins with `mise upgrade` (then `mise lock`) as part of
# routine maintenance.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      # `fix` so release-please cuts a patch and consumers pinned to our SHAs/tags pick the
      # bump up; the actions ecosystem has no dev/prod split, so a single prefix covers all
      prefix: fix
      include: scope
    cooldown:
      default-days: 7
      # our own actions ship straight through — no cooldown wait
      exclude:
        - bitwise-media-group/*
    groups:
      actions:
        patterns:
          - actions/*
      github:
        patterns:
          - github/*
      bitwise-media-group:
        patterns:
          - bitwise-media-group/*
      codecov:
        patterns:
          - codecov/*
      google:
        patterns:
          - google/*
          - googleapis/*
      goreleaser:
        patterns:
          - goreleaser/*
