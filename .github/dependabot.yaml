# Keep the SHA-pinned actions in the reusable workflows fresh. This repo holds
# only workflow YAML (no npm or Go modules), so github-actions is the only
# ecosystem.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
      # our own actions ship straight through — no cooldown wait
      exclude:
        - bitwise-media-group/*
    groups:
      actions:
        patterns:
          - actions/*
      github:
        patterns:
          - github/*
      bitwise-media-group:
        patterns:
          - bitwise-media-group/*
      codecov:
        patterns:
          - codecov/*
      google:
        patterns:
          - google/*
          - googleapis/*
      goreleaser:
        patterns:
          - goreleaser/*
