# This repo's own caller for the reusable add-to-project workflow — dogfoods it by
# local path (`./.github/workflows/...`), so it always runs this repo's current
# definition rather than a release pin. When an issue is opened here it is added to
# the shared org "Roadmap" project alongside every other repo's issues.
#
# Org prerequisites (see README): the "Project Sync" App exposed as the
# ADD_TO_PROJECT_CLIENT_ID variable + ADD_TO_PROJECT_PRIVATE_KEY secret.

name: Add to Project

on:
  issues:
    types: [opened]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  add:
    uses: ./.github/workflows/add-to-project.yaml
    with:
      project-url: https://github.com/orgs/bitwise-media-group/projects/1
      app-client-id: ${{ vars.ADD_TO_PROJECT_CLIENT_ID }}
    secrets:
      app-private-key: ${{ secrets.ADD_TO_PROJECT_PRIVATE_KEY }}
