# Reusable release pipeline for GitHub Actions repos (Node/TypeScript).
# Release-please watches main
# and keeps a release PR current from the Conventional Commit history; when that
# PR merges it cuts the GitHub release and vX.Y.Z tag. The publish job then
# re-validates the released commit (the committed dist/ must reproduce from src/)
# and moves the floating major tag (v1, v2, ...) consumers reference.
#
# Runs via workflow_call from a thin caller (examples/release-actions.yaml) that
# owns the push trigger and grants the release permissions. The consuming repo
# must provide release-please-config.json + .release-please-manifest.json, an
# `npm run all` build, a committed dist/, and a .node-version file.
name: Release

on:
  workflow_call:
    inputs:
      node-version-file:
        description: File the Node version is read from (passed to setup-node).
        required: false
        default: .node-version
        type: string

# granted per job
permissions: {}

concurrency:
  group: release

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      # create github release and associated tag
      contents: write
      # create release pull request labels through the issues api
      issues: write
      # create the release pull request
      pull-requests: write
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
      sha: ${{ steps.release-please.outputs.sha }}
    steps:
      # Manifest mode (release-please-config.json + .release-please-manifest.json,
      # auto-detected when release-type is omitted) so the first run is
      # deterministic: the 0.0.0 manifest anchor + the initial feat commit cut
      # v0.1.0, not a bootstrapped guess.
      - name: Create release pull request
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release-please

  publish:
    needs: release-please
    # Only run the privileged checkout + build (npm run all) of a computed ref
    # from a trusted trigger. This workflow is reusable, so CodeQL can't see the
    # caller's trigger and assumes a privileged fork-PR context; the guard makes
    # the trusted-context assumption explicit and enforced (defense in depth
    # against a consumer wiring this to pull_request_target). This is a positive
    # allowlist, not a denylist of fork-triggerable events: a new event type
    # GitHub may add later fails closed (the job is skipped) until it is vetted
    # and added here.
    if: >-
      needs.release-please.outputs.release_created &&
      contains(fromJSON('["push","workflow_dispatch","schedule"]'), github.event_name)
    runs-on: ubuntu-latest
    permissions:
      # move the floating major tag
      contents: write
    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm

      - name: Install node dependencies
        run: npm ci
      - name: Run build pipeline
        run: npm run all
      - name: Verify released dist/ reproduces from src/
        run: git diff --exit-code -- dist

      - name: Move floating major tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SHA: ${{ needs.release-please.outputs.sha }}
        run: |
          set -eu
          MAJOR="${TAG%%.*}"
          gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$MAJOR" -X PATCH -f sha="$SHA" -F force=true ||
          gh api "repos/$GITHUB_REPOSITORY/git/refs" -f ref="refs/tags/$MAJOR" -f sha="$SHA"
