# This repo's own CodeQL run. It scans just the `actions` language (build-free):
# the library is GitHub Actions YAML + Markdown, with no compilable Go and no
# JavaScript/TypeScript product source (the package.json is prose-linting tooling
# only). The reusable codeql workflow would add a javascript-typescript leg from
# that package.json with nothing to analyse, so the actions-only analysis is
# inlined here instead, mirroring codeql.yaml.
name: CodeQL analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]
  schedule:
    - cron: "28 20 * * 4"

# granted per job
permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # upload analysis results to code scanning
      security-events: write
      # fetch internal or private CodeQL packs
      packages: read
      # only required for workflows in private repositories
      actions: read
      # check out the repository
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [actions]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # read-only checkout; don't leave the token in .git/config

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yaml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
