# Reusable CI for Go repos: build, vet, race-detector tests with coverage,
# vulnerability scan, and prose lint, then a Codecov upload isolated from
# PR-supplied code. The Go version comes from go.mod, never the workflow.
#
# Every gate runs through a Makefile target so local `make` and CI run the same
# command. The consuming repo must provide a Makefile with targets `build`,
# `vet`, `test-coverage` (emitting cobertura-coverage.xml at the repo root),
# `vuln`, `lint-md`, and `fmt-check`, plus go.mod and a package.json for the
# node-based doc linters. Coverage tools (gocover-cobertura, govulncheck) should
# be pinned in tools/go.mod and invoked via `go tool`, not `go install @latest`.
#
# Runs via workflow_call from a thin caller (examples/ci-go.yaml) that owns the
# push/pull_request triggers.
name: Continuous integration

on:
  workflow_call:
    inputs:
      go-version-file:
        description: File the Go version is read from (passed to setup-go).
        required: false
        default: go.mod
        type: string
      node-version-file:
        description: >-
          File the Node version is read from (passed to setup-node) -- node is used for markdown lint and prettier
          formatting.
        required: false
        default: .node-version
        type: string
      cache-dependency-path:
        description: One or more go.sum lockfiles to key the module cache on (newline-separated).
        required: false
        default: go.sum
        type: string

# granted per job
permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Test with coverage
        run: make test-coverage

      - name: Vulnerability check
        run: make vuln

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: cobertura-coverage.xml
          if-no-files-found: error

  coverage:
    needs: test
    if: ${{ !cancelled() && needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: cobertura-coverage.xml
          disable_search: true
          fail_ci_if_error: true

  lint:
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm

      - name: Markdown lint
        run: make lint-md

      - name: Format check
        run: make fmt-check
