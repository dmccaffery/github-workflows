# This repo's own caller for the reusable auto-merge workflow — the library
# dogfoods its own set-and-forget merge. A maintainer arms a PR (comments
# `/auto-merge` or adds the `auto-merge` label) and it is fast-forwarded
# automatically once approved and green, preserving its signature.
#
# Calls the reusable workflow by local path so it tracks this repo's current
# definition rather than a pinned release (like self-merge.yaml).
#
# All four triggers are required: issue_comment + pull_request(labeled) arm the PR;
# pull_request_review(approved) and workflow_run(completed) attempt the merge. The
# label path uses pull_request (not pull_request_target), so it arms same-repo PRs
# only — fork PRs arm via the /auto-merge comment. The workflow_run list names every
# workflow that must pass — "Continuous integration" (self-ci.yaml) and "CodeQL
# analysis" (self-codeql.yaml); whichever finishes last triggers the attempt, and
# ff-merge verifies all checks before moving the ref.
#
# Org prerequisites (see bitwise-media-group/ff-merge): the FF_MERGE_CLIENT_ID
# variable + FF_MERGE_PRIVATE_KEY secret and the "FF Merge" App in main's ruleset
# bypass list — the same App as the /merge flow.
name: Auto-merge

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ["Continuous integration", "CodeQL analysis"]
    types: [completed]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  auto-merge:
    uses: ./.github/workflows/auto-merge.yaml
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
