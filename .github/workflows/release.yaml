# Reusable release pipeline for any repo. Release-please watches main and keeps a
# release PR current from the Conventional Commit history; when that PR merges it
# cuts the GitHub release and vX.Y.Z tag. What happens next depends on the repo:
#
#   - A repo with a .goreleaser.yaml takes the `goreleaser` job: GoReleaser builds
#     archives + checksums + SBOMs + keyless cosign signatures, an optional
#     Homebrew cask, and a GitHub build-provenance attestation over checksums.txt,
#     then adopts and publishes the draft release.
#   - Every other repo takes the `publish` job: it rebuilds via `make build` and
#     verifies a committed dist/ reproduces from source.
#
# Either job, when the caller sets vanity-tags: true, moves the floating major and
# minor tags (v1 and v1.1) that consumers pin.
#
# Detection is a single hashFiles output on the release-please job, because a
# job-level `if:` runs before checkout and can't see the workspace. The two-pass
# release-please + idempotent tag creation works for both draft (goreleaser) and
# non-draft releases.
#
# Callers can gate follow-on work (docs publish, deploys, notifications) on the
# workflow_call outputs below: release_created is truthy only when this run cut a
# release, alongside the tag_name/sha/version/major/minor/patch it produced (all
# empty otherwise). This lets a caller append a release-only job instead of, e.g.,
# rebuilding docs on every push to main.
#
# The consuming repo provides release-please-config.json + .release-please-manifest.json
# and a Makefile `build` target (a no-op is fine). Go repos add a .goreleaser.yaml
# (release-type: go, draft: true); Actions repos commit dist/ and set vanity-tags: true.
#
# Runs via workflow_call from a thin caller (examples/release.yaml) that owns the
# push trigger and grants the release permissions.
name: Reusable Release

on:
  workflow_call:
    inputs:
      go-version-file:
        description: File the Go version is read from (passed to setup-go).
        required: false
        default: go.mod
        type: string
      node-version-file:
        description: File the Node version is read from (passed to setup-node).
        required: false
        default: .node-version
        type: string
      vanity-tags:
        description: >-
          Move the floating major and minor tags (v1 and v1.1) to the release commit, for any release type. Off by
          default; set true for Actions/reusable repos whose consumers pin @v1.
        required: false
        default: false
        type: boolean
      app-client-id:
        description: >-
          Optional client id of a GitHub App used to author the release (e.g. vars.FF_MERGE_CLIENT_ID). When set (with
          app-private-key) release-please authenticates as the App instead of the default GITHUB_TOKEN, so the release
          PR's branch push is attributed to the App. Set this when workflow_run-keyed automation must fire for the
          release PR: a push made with the default GITHUB_TOKEN does NOT emit workflow_run events (GitHub's
          recursion guard), so auto-merge keyed on workflow_run never retriggers when the release PR's checks go green.
          Falls back to GITHUB_TOKEN when unset.
        required: false
        default: ""
        type: string
    secrets:
      app-private-key:
        description: >-
          Private key for the App named by app-client-id (e.g. secrets.FF_MERGE_PRIVATE_KEY). Required when app-client-id
          is set; ignored otherwise.
        required: false
      homebrew-tap-token:
        description: >-
          PAT with write access to the Homebrew tap repository (secrets.HOMEBREW_TAP_GITHUB_TOKEN). Optional; only
          needed if .goreleaser.yaml publishes a cask.
        required: false
    # Surface the release-please result so a caller can add release-only jobs.
    # Every value is an empty string when this run did not cut a release, so gate
    # with `if: ${{ needs.release.outputs.release_created }}` (where `release` is
    # the caller's job that `uses:` this workflow).
    outputs:
      release_created:
        description: >-
          "true" when this run cut a release (the release PR merged), empty string otherwise. Use as the gate for
          follow-on jobs: `if: ${{ needs.release.outputs.release_created }}`.
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: Git tag of the release just cut (e.g. v1.2.3). Empty string when no release was created.
        value: ${{ jobs.release-please.outputs.tag_name }}
      sha:
        description: Commit SHA the release was tagged at. Empty string when no release was created.
        value: ${{ jobs.release-please.outputs.sha }}
      version:
        description: Full semver of the release, no leading v (e.g. 1.2.3). Empty string when no release was created.
        value: ${{ jobs.release-please.outputs.version }}
      major:
        description: Major component of the released version (e.g. 1). Empty string when no release was created.
        value: ${{ jobs.release-please.outputs.major }}
      minor:
        description: Minor component of the released version (e.g. 2). Empty string when no release was created.
        value: ${{ jobs.release-please.outputs.minor }}
      patch:
        description: Patch component of the released version (e.g. 3). Empty string when no release was created.
        value: ${{ jobs.release-please.outputs.patch }}

# Granted per job below. Note for callers: GitHub validates a reusable workflow's
# permissions as the union of every job and ignores `if:`, so a caller must grant
# the goreleaser job's id-token/attestations/artifact-metadata even on the publish
# path where that job is skipped -- see examples/release.yaml.
permissions: {}

# concurrent release-please runs can open duplicate release PRs; queue them.
concurrency:
  group: release

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      # create draft release and git tag
      contents: write
      # create pr labels via issues api
      issues: write
      # create the release pull request
      pull-requests: write
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
      sha: ${{ steps.release-please.outputs.sha }}
      version: ${{ steps.release-please.outputs.version }}
      major: ${{ steps.release-please.outputs.major }}
      minor: ${{ steps.release-please.outputs.minor }}
      patch: ${{ steps.release-please.outputs.patch }}
      # internal: truthy hash that picks the goreleaser vs publish job (not a workflow_call output)
      goreleaser: ${{ steps.detect.outputs.goreleaser }}
    steps:
      # checked out so the goreleaser detection below can read the workspace; a
      # job-level `if:` on the downstream jobs runs before their checkout and
      # could not see it.
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # release-please authenticates with the App token or GITHUB_TOKEN, not the persisted credential

      # When the caller supplies a GitHub App (app-client-id + app-private-key),
      # mint a short-lived installation token so release-please authors the release
      # as the App. This is what lets the release PR's branch push emit workflow_run
      # events: a push made with the default GITHUB_TOKEN is suppressed by GitHub's
      # recursion guard, so any workflow_run-keyed automation (e.g. the reusable
      # auto-merge) never fires when a GITHUB_TOKEN-authored release PR goes green.
      # Skipped when no App is configured: the output is empty and every step below
      # falls back to GITHUB_TOKEN (release PR still opens, just doesn't retrigger
      # workflow_run automation).
      - name: Mint a github app installation token
        id: app-token
        if: inputs.app-client-id != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.app-client-id }}
          private-key: ${{ secrets.app-private-key }}
          # release-please cuts the release/tag (contents) and opens the release PR
          # (pull-requests); the autorelease:* labels it applies already exist, so
          # pull-requests:write covers labelling and no issues scope is needed.
          permission-contents: write
          permission-pull-requests: write

      # The goreleaser output is the config-file hash (empty when absent), used
      # downstream as a truthy flag to pick the goreleaser vs publish job.
      - name: Detect goreleaser config
        id: detect
        run: echo "goreleaser=${{ hashFiles('.goreleaser.yaml', '.goreleaser.yml') }}" >> "$GITHUB_OUTPUT"

      # First pass cuts the release only; the release PR is built in a second pass
      # below, once the tag exists.
      - name: Get release version
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release-please
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          skip-github-pull-request: true

      # Guarantee the tag exists at the released commit: a draft release (go,
      # draft: true) has no tag yet and GoReleaser cannot version without one, so
      # create it; a non-draft release already made it, so the create fails and the
      # patch sets it to the same commit (a no-op). Idempotent either way.
      - name: Create release tag
        if: ${{ steps.release-please.outputs.release_created }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-please.outputs.tag_name }}
          SHA: ${{ steps.release-please.outputs.sha }}
        run: |
          set -eu
          gh api "repos/$GITHUB_REPOSITORY/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA" ||
          gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG" -X PATCH -f sha="$SHA" -F force=true

      # Build the release PR only now that the tag exists. A draft release whose
      # tag ref is missing is invisible to release-please's latest-release lookup,
      # so computing the PR in the same pass that cuts a release treats every
      # released commit as unreleased and opens a duplicate vNext PR.
      - name: Create release pull request
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          skip-github-release: true

  goreleaser:
    needs: release-please
    # Only run the privileged, full-history checkout of a computed ref from a
    # trusted trigger. This workflow is reusable, so CodeQL can't see the caller's
    # trigger and assumes a privileged fork-PR context; the guard makes the
    # trusted-context assumption explicit and enforced (defense in depth against a
    # consumer wiring this to pull_request_target). This is a positive allowlist,
    # not a denylist of fork-triggerable events: a new event type GitHub may add
    # later fails closed (the job is skipped) until it is vetted and added here.
    if: >-
      needs.release-please.outputs.release_created && needs.release-please.outputs.goreleaser &&
      contains(fromJSON('["push","workflow_dispatch","schedule"]'), github.event_name)
    runs-on: ubuntu-latest
    permissions:
      # upload assets and publish the draft release (and move vanity tags)
      contents: write
      # use id token for cosign keyless signing
      id-token: write
      # write github provenance attestation
      attestations: write
      # create artifact storage record for github attestation
      artifact-metadata: write
    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog
          persist-credentials: false # GoReleaser publishes via the GITHUB_TOKEN env, not the persisted credential

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          # No build cache in the release-signing job: a cache poisoned from a
          # less-trusted context must not feed the signed, attested artifacts.
          cache: false

      # cosign for the binary_signs keyless signing config.
      - name: Setup cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # SBOMs use the syft pinned in tools/go.mod (invoked via `go tool` by the
      # sboms config) -- no separate syft install step.
      - name: Create release (goreleaser)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to the Homebrew tap -- the default GITHUB_TOKEN
          # cannot push the cask to another repository.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.homebrew-tap-token }}

      # Attest SLSA build provenance (the default mode when no predicate is given)
      # for every file listed in checksums.txt (archives + SBOMs + signature
      # bundles). Verify with:
      #   gh attestation verify --owner <org> <file>
      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt

      - name: Move vanity tags
        if: ${{ inputs.vanity-tags }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SHA: ${{ needs.release-please.outputs.sha }}
        run: |
          set -eu
          MAJOR="${TAG%%.*}" # v1
          MINOR="${TAG%.*}"  # v1.1
          for ref in "$MAJOR" "$MINOR"; do
            gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$ref" -X PATCH -f sha="$SHA" -F force=true ||
            gh api "repos/$GITHUB_REPOSITORY/git/refs" -f ref="refs/tags/$ref" -f sha="$SHA"
          done

  publish:
    needs: release-please
    # Same trusted-trigger allowlist as the goreleaser job above (fails closed on
    # any event type not vetted here).
    if: >-
      needs.release-please.outputs.release_created && !needs.release-please.outputs.goreleaser &&
      contains(fromJSON('["push","workflow_dispatch","schedule"]'), github.event_name)
    runs-on: ubuntu-latest
    permissions:
      # move vanity tags
      contents: write
    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false # build + verify only; vanity tags move via the GITHUB_TOKEN env

      # Only a root go.mod (not the universal addlicense go.work/tools/go.mod) marks
      # a repo that builds Go; a `make build` for a non-Go repo needs no toolchain.
      - name: Setup go
        if: hashFiles('go.mod')
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Setup node
        if: hashFiles('package.json')
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm

      - name: Install node packages
        if: hashFiles('package.json')
        run: npm ci

      - name: Run build pipeline
        run: make build

      # Verify a committed dist/ reproduces from source. Vacuous (and harmless) for
      # repos that don't commit a dist/ -- the pathspec simply matches nothing.
      - name: Verify dist/ is up to date
        run: git diff --exit-code -- dist

      - name: Move vanity tags
        if: ${{ inputs.vanity-tags }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SHA: ${{ needs.release-please.outputs.sha }}
        run: |
          set -eu
          MAJOR="${TAG%%.*}" # v1
          MINOR="${TAG%.*}"  # v1.1
          for ref in "$MAJOR" "$MINOR"; do
            gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$ref" -X PATCH -f sha="$SHA" -F force=true ||
            gh api "repos/$GITHUB_REPOSITORY/git/refs" -f ref="refs/tags/$ref" -f sha="$SHA"
          done
