# Reusable CI for any repo. Runs the canonical mise tasks -- lint, build, test --
# as one parallel job per task, then a Codecov upload isolated from PR-supplied
# code. Language toolchains are set up only when their marker file is present at
# the repo root: setup-go when go.mod (a Go product) exists, setup-node when
# package.json exists (Go repos still use node for the doc linters), setup-uv
# when pyproject.toml exists -- we standardise on uv for Python, and uv downloads
# a matching interpreter on demand. mise is both the task runner and the source
# of the pinned dev CLIs the tasks invoke. The repo's mise config is the
# language boundary; this workflow never hard-codes go, npm, or uv.
#
# The consuming repo must provide a mise config -- a root mise.toml, or the
# shared task library (bitwise-media-group/make) mounted at .mise/ -- defining
# whichever of the canonical tasks do real work there:
#   lint  -- all check-mode static analysis (prettier --check, markdownlint, golangci-lint, govulncheck, ...)
#   build -- compile / build dist/
#   test  -- tests with coverage, emitting coverage/cobertura-coverage.xml (and optionally coverage/junit.xml)
#   e2e   -- end-to-end tests (only run when the caller sets e2e: true)
# There are no no-op stubs: this workflow discovers the task list
# (`mise tasks ls --name-only`) and skips absent tasks. A repo with no mise
# config fails loudly -- there is no Makefile fallback. Coverage is optional -- a
# repo that emits none still passes, and a repo that emits no coverage at all
# (e.g. the skills library) sets `coverage: false` to skip the Codecov upload
# job entirely.
#
# Runs via workflow_call from a thin caller (examples/ci.yaml) that owns the
# push/pull_request triggers.
name: Reusable Continuous Integration

on:
  workflow_call:
    inputs:
      go-version-file:
        description: File the Go version is read from (passed to setup-go).
        required: false
        default: go.mod
        type: string
      node-version-file:
        description: File the Node version is read from (passed to setup-node).
        required: false
        default: .node-version
        type: string
      cache-dependency-path:
        description: One or more go.sum lockfiles to key the module cache on (newline-separated).
        required: false
        default: go.sum
        type: string
      e2e:
        description: Run the `e2e` task job. Off by default; e2e often needs services or secrets.
        required: false
        default: false
        type: boolean
      coverage:
        description: Upload coverage and test results to Codecov. Set false for repos that emit neither.
        required: false
        default: true
        type: boolean

# granted per job
permissions: {}

jobs:
  # One parallel job per canonical task. Each detects and sets up only the
  # toolchains the repo actually has, then runs `mise run <task>`.
  tasks:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        target: [lint, build, test]
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # read-only checkout; don't leave the token in .git/config
          submodules: true # fetch the shared task library (bitwise-media-group/make), mounted at .mise/; a no-op where no submodule exists

      # A root go.mod marks a repo that builds Go -- set up from it, cached on
      # go.sum. Non-Go repos need no setup-go: the pinned dev CLIs that the
      # lint task runs (addlicense, tflint, ...) install as prebuilt binaries
      # via mise below, and the one source-built tool (govulncheck) compiles
      # with the Go toolchain mise itself provisions from its pins.
      - name: Setup go
        if: hashFiles('go.mod')
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      # node only for repos that build Node (the prose linters -- prettier,
      # markdownlint-cli2 -- come from mise with its own pinned Node runtime).
      - name: Setup node
        if: hashFiles('package.json')
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm

      # uv is our Python toolchain -- gate on pyproject.toml (every uv project has
      # one). uv reads requires-python / .python-version and downloads a matching
      # interpreter on demand when a task runs `uv run` / `uv sync`; the cache
      # is keyed on the lockfiles. No setup-python: we standardise on uv.
      - name: Setup uv
        if: hashFiles('pyproject.toml')
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # mise installs the pinned dev CLIs the tasks run, verifying each
      # download's sha256 (and provenance, where published) against the
      # library's mise.lock (`--locked` is added automatically). The whole
      # toolset is installed eagerly and cached keyed on the config hash, so
      # after the first run per pin-set this restores from cache. Gated on a
      # config existing at the repo root (a root mise.toml, or the library
      # mounted at .mise/ -- both resolve from the workspace root); a repo with
      # neither fails the task-detection step below with a clear error.
      - name: Setup mise
        if: ${{ hashFiles('mise.toml') || hashFiles('.mise/config.toml') }}
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.3
          # sha256 of the mise-v2026.7.3-linux-x64 binary, from the release's
          # SHASUMS256.txt -- the action verifies the extracted binary, not the archive
          sha256: 06088e84e4514b59fd2b6b17927bcc37aa0ab10020a270868871fb010b92069b

      # A repo defines only the canonical tasks that do real work -- there are
      # no no-op stubs -- so ask mise for the task list and skip the tasks this
      # repo does not define. A mise failure fails this step rather than
      # silently skipping the task.
      - name: Detect the ${{ matrix.target }} task
        id: task
        env:
          TARGET: ${{ matrix.target }}
        run: |
          if [ ! -f mise.toml ] && [ ! -f .mise/config.toml ]; then
            echo "::error::no mise config found (mise.toml or .mise/config.toml) -- this workflow requires the mise-task layout"
            exit 1
          fi
          tasks="$(mise tasks ls --name-only)"
          if printf '%s\n' "$tasks" | grep -qxF -- "$TARGET"; then
            echo "run=true" >>"$GITHUB_OUTPUT"
          else
            echo "run=false" >>"$GITHUB_OUTPUT"
            echo "no '$TARGET' task defined -- skipping"
          fi

      - name: Run ${{ matrix.target }}
        if: steps.task.outputs.run == 'true'
        env:
          TARGET: ${{ matrix.target }}
        run: mise run "$TARGET"

      # Repos that commit their build output -- a JavaScript Action shipping a
      # checked-in dist/, which GitHub runs directly with no build at consumption
      # time -- must keep that artifact in sync with source. After the build task
      # regenerates dist/, a non-empty diff means the committed copy is stale; fail
      # the PR so it never reaches main (and never gets released). Gated on dist/
      # existing, so it is a no-op for the repos that don't commit one.
      - name: Verify dist/ is up to date
        if: ${{ matrix.target == 'build' && hashFiles('dist/**') != '' }}
        run: git diff --exit-code -- dist

      # Coverage is optional: gated on the `coverage` input (off for repos that
      # emit none, e.g. the skills library), and even when on, `if-no-files-found:
      # ignore` keeps a repo that happens to produce nothing from erroring -- the
      # isolated coverage job below skips the upload when nothing was produced.
      # Go repos emit the native profile (coverage.out, which Codecov ingests
      # directly); everything else emits Cobertura XML -- always one or the other.
      - name: Upload coverage artifact
        if: ${{ matrix.target == 'test' && inputs.coverage }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage/coverage.out
            coverage/cobertura-coverage.xml
          if-no-files-found: ignore

      - name: Upload test results artifact
        if: ${{ matrix.target == 'test' && inputs.coverage }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: coverage/junit.xml
          if-no-files-found: ignore

  # Upload to Codecov from a clean checkout that never ran the build, keeping the
  # Codecov token isolated from PR-supplied code. Tolerant of repos that emit no
  # coverage: the downloads may find nothing and each upload is gated on the file.
  coverage:
    needs: tasks
    if: ${{ !cancelled() && needs.tasks.result == 'success' && inputs.coverage }}
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # read-only checkout; don't leave the token in .git/config

      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
        continue-on-error: true

      # The artifact holds the native Go profile or Cobertura XML, never both --
      # upload whichever the test job produced.
      - name: Upload coverage report
        if: ${{ hashFiles('coverage.out', 'cobertura-coverage.xml') != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ${{ hashFiles('coverage.out') && 'coverage.out' || 'cobertura-coverage.xml' }}
          disable_search: true
          fail_ci_if_error: true

      - name: Download test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-results
        continue-on-error: true

      - name: Upload test results
        if: hashFiles('junit.xml')
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          # the artifact holds only this one file; don't let the action walk the tree
          files: junit.xml
          disable_search: true
          fail_ci_if_error: true

  # Opt-in end-to-end tests. Kept separate from the always-on gates because e2e
  # commonly needs services or secrets and shouldn't run on every PR by default.
  e2e:
    if: ${{ inputs.e2e }}
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # read-only checkout; don't leave the token in .git/config
          submodules: true # fetch the shared task library (bitwise-media-group/make), mounted at .mise/; a no-op where no submodule exists

      - name: Setup go
        if: hashFiles('go.mod')
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: Setup node
        if: hashFiles('package.json')
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm

      - name: Setup uv
        if: hashFiles('pyproject.toml')
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # See the tasks job's Setup mise step: pinned dev CLIs install via mise.
      - name: Setup mise
        if: ${{ hashFiles('mise.toml') || hashFiles('.mise/config.toml') }}
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.3
          # sha256 of the mise-v2026.7.3-linux-x64 binary, from the release's
          # SHASUMS256.txt -- the action verifies the extracted binary, not the archive
          sha256: 06088e84e4514b59fd2b6b17927bcc37aa0ab10020a270868871fb010b92069b

      # No task-existence gate here: e2e is opt-in (`e2e: true` in the caller),
      # so a repo that opts in without defining the task should fail loudly.
      - name: Run e2e
        run: mise run e2e
