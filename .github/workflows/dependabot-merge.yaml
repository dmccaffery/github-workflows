# Reusable Dependabot auto-merge. Dependabot opens a PR; if it is a minor or patch
# update this approves it, then SQUASH-merges it into the base branch once every
# check on its head is green. Squash — not the fast-forward the `/merge` flow uses
# (see merge.yaml) — so a green PR that is merely *behind* the base branch still
# merges: queued Dependabot PRs no longer need a rebase (and a full CI rerun)
# between each merge, and only genuinely conflicting PRs wait for Dependabot's
# rebase. Major updates are never approved, so they wait for a human.
#
# The squash is a plain PR merge performed as the App, which sits in the ruleset
# bypass list (the same listing the `/merge` flow relies on), so the rebase-only
# merge-method rule does not apply to it — no ruleset or repo-setting change is
# needed, and the merge button stays dead for everyone else. The squash commit
# GitHub creates server-side is web-flow-signed and single-parent, satisfying the
# base branch's required-signatures and linear-history rules, and its title is
# Dependabot's Conventional-Commit subject, so release-please reads the squash
# exactly as it read a fast-forwarded Dependabot commit.
#
# One event, one job. The caller triggers only on workflow_run(completed) — an event
# that does NOT attach a check run to the PR, so this workflow leaves no skipped-job
# clutter on the PR's checks list (and uses no pull_request_target). When a watched CI
# workflow for a `dependabot/` branch finishes green, the `merge` job:
#
#   1. resolves the open PR for the branch and confirms Dependabot authored it;
#   2. reads the SEMVER POLICY straight from the PR head commit. dependabot/fetch-metadata
#      cannot run here — it reads the PR from a pull_request(_target) event payload, which
#      a workflow_run does not have — so the update type comes from the head commit message:
#      the `update-type: version-update:semver-*` trailer Dependabot writes for DIRECT deps,
#      and — for INDIRECT deps, which carry a `dependency-version:` but no `update-type:` —
#      the major/minor/patch delta computed from the `from <old> to <new>` versions in the
#      message. That message is only trustworthy if the commit really is Dependabot's, so the
#      job first verifies the head commit is authored by dependabot[bot] AND carries a valid
#      signature (the same checks fetch-metadata makes by default). It then refuses unless
#      EVERY level found in the message is within `update-types` — so a tampered or grouped
#      commit that hides a major is not approved;
#   3. approves the PR (App token) when, and only when, the update is in policy;
#   4. squash-merges. The merge runs whenever an approval exists — the bot's for in-policy
#      updates, or a human's for anything they choose to approve — and the job re-verifies
#      the review decision and that EVERY check run and commit status on the head is green
#      (the same all-green gate ff-merge applies to /merge, not just the ruleset-required
#      subset) before merging. workflow_run — not check_suite — is used
#      because GitHub does not fire check_suite/check_run for a repo's own GitHub Actions CI.
#
# Approval and the merge both use a short-lived App token: a GitHub App can approve
# regardless of the org "Allow GitHub Actions to approve pull requests" setting (that only
# restricts GITHUB_TOKEN). The caller therefore grants no permissions.
#
# Requires branch protection that requires PR review (so an approval sets the review
# decision to APPROVED) — the same assumption as the `/merge` flow. See README.md for the
# one-time org setup (App, ruleset bypass, org var/secret); it is the same "FF Merge" App
# as merge.yaml.
name: Reusable Dependabot Auto-Merge

on:
  workflow_call:
    inputs:
      app-client-id:
        description: The client id of the github app used to approve and merge (vars.FF_MERGE_CLIENT_ID)
        required: true
        type: string
      update-types:
        description: >-
          JSON array of Dependabot update types to auto-approve and merge. Defaults to minor and patch. Add
          "version-update:semver-major" to also auto-merge majors (not recommended).
        required: false
        default: '["version-update:semver-patch", "version-update:semver-minor"]'
        type: string
    secrets:
      app-private-key:
        description: The private key for the github app used to approve and merge (secrets.FF_MERGE_PRIVATE_KEY)
        required: true

# the App token does all privileged work; the job GITHUB_TOKENs need nothing
permissions: {}

jobs:
  merge:
    # Only when a watched CI workflow for a Dependabot branch finished green.
    if: >-
      github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch,
      'dependabot/')
    runs-on: ubuntu-latest
    # Serialize ref moves within a repo so a /merge and a Dependabot merge cannot race
    # (same group as merge.yaml).
    concurrency:
      group: ff-merge-${{ github.repository }}
      cancel-in-progress: false
      queue: max

    steps:
      - name: Mint a github app installation token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.app-client-id }}
          private-key: ${{ secrets.app-private-key }}
          # the merge writes the squash commit to the base branch (contents) and
          # reads/approves/merges the PR (pull-requests), needs workflows because
          # Dependabot's actions bumps touch .github/workflows/ files, and the all-green
          # gate reads the head commit's status rollup — Checks-API check runs (checks)
          # plus legacy commit statuses (statuses); the approval (minor/patch only) is
          # the authorization gate, not maintainer-only, so no administration scope is
          # needed.
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write
          permission-checks: read
          permission-statuses: read

      - name: Resolve the Dependabot PR and assess the update policy
        id: assess
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          UPDATE_TYPES: ${{ inputs.update-types }}
        run: |
          set -euo pipefail

          # workflow_run carries the branch, not the PR. Find the open PR for it and
          # confirm Dependabot authored it (a human cannot open a PR as dependabot[bot],
          # so an author match means it is genuinely a Dependabot PR). gh reports the bot
          # author from its GraphQL backing as `app/dependabot`, while the REST commit check
          # below sees the classic `dependabot[bot]`; accept either spelling of the bot here.
          read -r number sha < <(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
            --json number,author,headRefOid \
            --jq 'map(select(.author.is_bot and (.author.login == "dependabot[bot]" or .author.login == "app/dependabot"))) | .[0] | "\(.number // "") \(.headRefOid // "")"')
          echo "number=${number}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          if [ -z "$number" ]; then
            echo "No open Dependabot PR for ${BRANCH}; nothing to do."
            echo "approve=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # The update type is taken from Dependabot's own commit trailer, so the head
          # commit must provably be Dependabot's: authored by dependabot[bot] AND signed
          # (a collaborator who force-pushed an unsigned commit to a dependabot/ branch to
          # sneak a major through as "patch" fails this gate). This mirrors what
          # fetch-metadata verifies by default.
          commit=$(gh api "repos/${REPO}/commits/${sha}")
          author=$(printf '%s' "$commit" | jq -r '.author.login // ""')
          verified=$(printf '%s' "$commit" | jq -r '.commit.verification.verified // false')
          message=$(printf '%s' "$commit" | jq -r '.commit.message')
          if [ "$author" != "dependabot[bot]" ] || [ "$verified" != "true" ]; then
            echo "Head commit ${sha} is not a verified Dependabot commit (author=${author}, verified=${verified}); not approving."
            echo "approve=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build the set of semver levels this update applies, then approve only if EVERY
          # one is in policy — so a major hidden anywhere (a grouped commit, an unparsable
          # version) leaves the PR for a human. The default is to refuse, never to approve.
          approve=true

          # (a) Explicit `update-type: version-update:semver-*` trailers. Dependabot writes
          # these for DIRECT deps, and a grouped update lists one per dependency.
          types=$(printf '%s\n' "$message" | grep -oE 'version-update:semver-[a-z]+' | sort -u || true)

          # (b) INDIRECT (transitive) deps carry a `dependency-version:` trailer but NO
          # `update-type:`, so (a) finds nothing for them. Derive the level from each
          # Dependabot "from <old> to <new>" line instead (anchored to the `Bumps`/`Updates`
          # lines so changelog prose cannot inject a spurious transition). A version that
          # does not parse into numeric major.minor.patch is treated as out of policy rather
          # than assumed safe.
          transitions=$(printf '%s\n' "$message" \
            | grep -E '^(Bumps|Updates) ' \
            | grep -oE 'from [0-9][0-9A-Za-z.+-]* to [0-9][0-9A-Za-z.+-]*' \
            || true)
          while IFS= read -r pair; do
            [ -n "$pair" ] || continue
            rest=${pair#from }
            old=${rest%% to *}; old=${old%.}; old=${old#v}
            new=${rest##* to }; new=${new%.}; new=${new#v}
            IFS=. read -r oM om op _ <<<"${old%%[-+]*}"
            IFS=. read -r nM nm np _ <<<"${new%%[-+]*}"
            oM=${oM:-0}; om=${om:-0}; op=${op:-0}
            nM=${nM:-0}; nm=${nm:-0}; np=${np:-0}
            case "$oM$om$op$nM$nm$np" in
              ''|*[!0-9]*)
                echo "Cannot classify version change ${old} -> ${new} in ${sha}; not approving."
                approve=false
                continue
                ;;
            esac
            if [ "$oM" != "$nM" ]; then lvl=major
            elif [ "$om" != "$nm" ]; then lvl=minor
            else lvl=patch
            fi
            types=$(printf '%s\nversion-update:semver-%s' "$types" "$lvl")
          done <<<"$transitions"
          types=$(printf '%s\n' "$types" | grep -vE '^[[:space:]]*$' | sort -u || true)

          if [ -z "$types" ]; then
            echo "No update-type metadata or parsable version change in commit ${sha}; not approving."
            echo "approve=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Any out-of-policy bump (e.g. a major) flips approve to false and leaves the PR
          # for a human. Each token is whitespace-free, so word-splitting $types is safe and
          # keeps the loop in this shell.
          for t in $types; do
            if ! printf '%s' "$UPDATE_TYPES" | jq -e --arg t "$t" 'index($t) != null' >/dev/null; then
              echo "Update type ${t} is not in policy; not approving."
              approve=false
            fi
          done
          echo "approve=${approve}" >> "$GITHUB_OUTPUT"

      - name: Approve in-policy update
        if: steps.assess.outputs.approve == 'true'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.assess.outputs.number }}
        run: |
          set -euo pipefail
          # Re-approving is a no-op when an active approval already exists; on a
          # synchronize that dismissed the prior review this restores it.
          gh pr review "$PR" --repo "$REPO" --approve \
            --body "Auto-approving in-policy Dependabot update."

      - name: Squash merge
        # Runs whenever a PR was found. Merges only if the PR is approved — the bot's
        # approval above for in-policy updates, or a human's for anything they chose to
        # approve (the approval is the authorization gate; Dependabot is not a
        # maintainer, so the actor's access is not checked) — and every check run and
        # commit status on the head is green. Expected holds — no approval yet, another
        # watched workflow still pending or red, a conflict left for Dependabot's
        # rebase, or a head that moved — exit 0 and the next workflow_run (or
        # Dependabot's rebase) retries; anything else fails the run so it is seen.
        if: steps.assess.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.assess.outputs.number }}
          SHA: ${{ steps.assess.outputs.sha }}
        run: |
          set -euo pipefail

          # The PR must be approved and still point at the head commit whose policy was
          # assessed above; a conflicted PR is Dependabot's to rebase. GitHub computes
          # mergeability lazily, so poll briefly while it reports UNKNOWN (and proceed
          # if it stays UNKNOWN — a real conflict then fails the merge, visibly).
          for _ in 1 2 3 4 5; do
            pr=$(gh pr view "$PR" --repo "$REPO" --json state,reviewDecision,mergeable,headRefOid)
            [ "$(printf '%s' "$pr" | jq -r .mergeable)" != "UNKNOWN" ] && break
            sleep 3
          done
          state=$(printf '%s' "$pr" | jq -r .state)
          decision=$(printf '%s' "$pr" | jq -r .reviewDecision)
          mergeable=$(printf '%s' "$pr" | jq -r .mergeable)
          head=$(printf '%s' "$pr" | jq -r .headRefOid)
          if [ "$state" != "OPEN" ]; then
            echo "PR #${PR} is ${state}; nothing to do."
            exit 0
          fi
          if [ "$decision" != "APPROVED" ]; then
            echo "PR #${PR} review decision is ${decision:-none}, not APPROVED; not merging."
            exit 0
          fi
          if [ "$head" != "$SHA" ]; then
            echo "PR #${PR} head moved (${head} != ${SHA}); the new head's own CI run retries."
            exit 0
          fi
          if [ "$mergeable" = "CONFLICTING" ]; then
            echo "PR #${PR} conflicts with its base branch; waiting for Dependabot to rebase."
            exit 0
          fi

          # EVERY check run must be completed with success/neutral/skipped and EVERY
          # commit status green — all checks, not just the ruleset-required subset (the
          # same gate ff-merge enforces for /merge). A watched workflow still running
          # holds the merge; its own completion event retries.
          blocking=$(gh api --paginate "repos/${REPO}/commits/${SHA}/check-runs?per_page=100" \
            --jq '.check_runs[]
                  | select(.status != "completed" or ((.conclusion // "") | IN("success","neutral","skipped") | not))
                  | "\(.name) (\(.conclusion // .status))"')
          if [ -n "$blocking" ]; then
            printf 'Checks on %s are not all green yet:\n%s\n' "$SHA" "$blocking"
            exit 0
          fi
          combined=$(gh api "repos/${REPO}/commits/${SHA}/status")
          if [ "$(printf '%s' "$combined" | jq -r .total_count)" != "0" ] \
            && [ "$(printf '%s' "$combined" | jq -r .state)" != "success" ]; then
            echo "Combined commit status on ${SHA} is $(printf '%s' "$combined" | jq -r .state); not merging."
            exit 0
          fi

          # A plain squash merge as the App — a ruleset bypass actor, so the rebase-only
          # merge-method rule does not block it. --match-head-commit closes the
          # verify-then-merge race: a push landing after the checks above makes GitHub
          # refuse rather than merge an unverified head.
          gh pr merge "$PR" --repo "$REPO" --squash --match-head-commit "$SHA"
          echo "Squash-merged PR #${PR} at ${SHA}."
