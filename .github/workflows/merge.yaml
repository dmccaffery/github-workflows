# Reusable fast-forward "merge". A maintainer comments `/merge`; this workflow
# mints a short-lived GitHub App token and runs the ff-merge action, which
# verifies write access, approval, passing checks, and a genuine fast-forward,
# then moves the base ref to the PR head. The commit object is untouched, so the
# original developer's signature is preserved and release-please sees each
# Conventional Commit individually.
#
# Runs only via workflow_call from a thin caller (examples/merge.yaml) that owns
# just the issue_comment trigger; the first-pass gate now lives on the job below.
# The action re-verifies everything security-relevant, so a misconfigured caller
# cannot move a branch on its own.
# See README.md for the one-time org setup (App, ruleset bypass, org var/secret).
name: Fast-forward merge

on:
  workflow_call:
    inputs:
      pr-number:
        description: The pull request number to merge
        required: true
        type: number
      app-client-id:
        description: The client id of the github app used to perform the merge (vars.FF_MERGE_CLIENT_ID)
        required: true
        type: string
      require-approval:
        description: A value indicating whether or not to require the pull request to be approved by a maintainer
        required: false
        default: true
        type: boolean
      maintainer-only:
        description: A value indicating whether or not to require the /merge comment author to be a maintainer
        required: false
        default: true
        type: boolean
    secrets:
      app-private-key:
        description: The private key for the github app used to perform the merge (secrets.FF_MERGE_PRIVATE_KEY)
        required: true

# the action authenticates with the App token; the job github token is not used
permissions: {}

# serialize ref moves within a repo so two concurrent /merge commands can't race
concurrency:
  group: ff-merge-${{ github.repository }}
  cancel-in-progress: false

jobs:
  fast-forward:
    # Cheap first-pass gate, centralized here so callers stay thin: a /merge
    # comment on a PR from someone in the org. A job-level `if` in a reusable
    # workflow reads the caller's triggering event, so github.event.* refers to
    # the original issue_comment. False short-circuits the job before any token
    # is minted; the ff-merge action still re-verifies write access
    # authoritatively, so this only filters noise. NB: this couples the workflow
    # to the issue_comment trigger — callers must trigger on issue_comment.
    if: >-
      github.event.issue.pull_request && github.event.comment.body == '/merge' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Mint a github app installation token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.app-client-id }}
          private-key: ${{ secrets.app-private-key }}

      - name: Fast-forward merge
        uses: bitwise-media-group/ff-merge@182b1c83d954664a09eca1aeee252873504a329a # v1.0.0
        with:
          token: ${{ steps.app.outputs.token }}
          repository: ${{ github.repository }}
          pr-number: ${{ inputs.pr-number }}
          actor: ${{ github.actor }}
          require-approval: ${{ inputs.require-approval }}
          maintainer-only: ${{ inputs.maintainer-only }}
