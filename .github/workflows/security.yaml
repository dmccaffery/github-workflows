# Reusable CodeQL security analysis for any repo. A prep job detects which
# languages are present at the repo root and builds the analysis matrix; the
# analyze job runs it. The repo's GitHub Actions workflows (`actions`, build-free)
# are always scanned; `go` (autobuild) is added when a root go.mod exists and
# `javascript-typescript` (build-free) when package.json exists. A polyglot repo
# gets all three. (go.work / tools/go.mod -- the addlicense tooling every repo
# carries -- is not a Go-product signal, so only a root go.mod adds the go leg.)
#
# The `languages` input overrides detection: pass an explicit list (e.g. "actions")
# to pin the matrix and skip the root probing -- useful when a tooling-only
# package.json would otherwise add an empty javascript-typescript leg.
#
# Alongside CodeQL, the actions leg also runs zizmor (GitHub Actions static
# analysis) whenever the repo ships a zizmor config file (zizmor.yml/.yaml at the
# root or under .github/) -- its presence is how a consumer opts in. zizmor uploads
# its own SARIF to code scanning and, in SARIF mode, never fails the run on findings.
#
# Go has no build-free mode, so autobuild observes a real `go build`; setup-go
# installs the toolchain matched to go-version-file (default go.mod), never the
# workflow.
#
# Runs via workflow_call from a thin caller (examples/security.yaml) that owns the
# push/pull_request/schedule triggers and grants the analyze permissions.
name: Reusable Security Analysis

on:
  workflow_call:
    inputs:
      go-version-file:
        description: File the Go version is read from (passed to setup-go for the go autobuild).
        required: false
        default: go.mod
        type: string
      config-file:
        description:
          Path to a CodeQL config file (e.g. ./.github/codeql/codeql-config.yaml). Empty uses CodeQL defaults.
        required: false
        default: ""
        type: string
      languages:
        description:
          Comma-separated CodeQL languages to analyse (e.g. "actions" or "actions,go"), overriding root detection. Empty
          (default) auto-detects actions, plus go (root go.mod) and javascript-typescript (package.json). Set this when
          detection would add an empty leg -- e.g. a tooling-only package.json.
        required: false
        default: ""
        type: string

# granted per job
permissions: {}

jobs:
  # Build the language matrix. An explicit `languages` input is used verbatim;
  # otherwise it's detected from the repo root. hashFiles is evaluated after
  # checkout (a job-level `if:` could not see the workspace), so the JSON is
  # assembled in this step. `actions` is always scanned when detecting.
  prep:
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # read-only checkout; don't leave the token in .git/config

      - name: Resolve languages
        id: detect
        # Pass workflow expressions in through env vars instead of interpolating ${{ }}
        # into the script. That keeps them out of the shell-code sink CodeQL tracks
        # (actions/code-injection) and, for the free-form `languages` caller input, stops
        # a supplied value being parsed as shell. hashFiles() can only yield "" or a hex
        # digest so it carries no metacharacters, but the same indirection is the
        # documented best practice for the rule.
        env:
          LANGUAGES: ${{ inputs.languages }}
          GO_MOD_HASH: ${{ hashFiles('go.mod') }}
          PACKAGE_JSON_HASH: ${{ hashFiles('package.json') }}
        run: |
          set -eu
          # An explicit `languages` input wins; otherwise detect from the repo root.
          # `actions` is always present, `go` (autobuild) needs a root go.mod and
          # `javascript-typescript` a package.json. go is the only compiled language
          # here, so everything else analyses build-free (build-mode: none).
          if [ -n "$LANGUAGES" ]; then
            langs=""
            IFS=', '
            for lang in $LANGUAGES; do
              if [ -z "$lang" ]; then continue; fi
              case "$lang" in
                go) mode=autobuild ;;
                *) mode=none ;;
              esac
              langs="${langs:+$langs,}{\"language\":\"$lang\",\"build-mode\":\"$mode\"}"
            done
          else
            langs='{"language":"actions","build-mode":"none"}'
            if [ -n "$GO_MOD_HASH" ]; then
              langs="$langs,{\"language\":\"go\",\"build-mode\":\"autobuild\"}"
            fi
            if [ -n "$PACKAGE_JSON_HASH" ]; then
              langs="$langs,{\"language\":\"javascript-typescript\",\"build-mode\":\"none\"}"
            fi
          fi
          echo "matrix={\"include\":[$langs]}" >> "$GITHUB_OUTPUT"

  analyze:
    needs: prep
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # upload analysis results to code scanning
      security-events: write
      # fetch internal or private CodeQL packs
      packages: read
      # only required for workflows in private repositories
      actions: read
      # check out the repository
      contents: read

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prep.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # read-only checkout; don't leave the token in .git/config

      # Match the module's Go toolchain so autobuild compiles the code the way
      # the project does.
      - if: matrix.language == 'go'
        name: Setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # empty string falls back to CodeQL's default config (no config file)
          config-file: ${{ inputs.config-file }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"

      # Audit the repo's workflows with zizmor on the actions leg only (it scans
      # GitHub Actions, not Go or JS/TS), and only when a zizmor config file is
      # detected -- that presence is how a consumer opts in. advanced-security (on
      # by default) uploads the SARIF to code scanning using the security-events
      # permission already granted to this job; in SARIF mode zizmor exits 0 even
      # with findings, so this step never fails the run.
      - name: Run zizmor
        if:
          matrix.language == 'actions' && hashFiles('zizmor.yml', 'zizmor.yaml', '.github/zizmor.yml',
          '.github/zizmor.yaml') != ''
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
