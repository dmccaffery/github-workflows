# Reusable CI for GitHub Actions repos (Node/TypeScript): lint, typecheck, unit
# tests with coverage, a fresh build, and a dist-reproducibility gate (the
# committed dist/ must match a build from src/), then a Codecov upload isolated
# from PR-supplied code.
#
# Runs via workflow_call from a thin caller (examples/ci-actions.yaml) that owns the
# push/pull_request triggers. The consuming repo must provide the npm scripts
# `check`, `typecheck`, `test:coverage` (emitting coverage/cobertura-coverage.xml
# and test-report.junit.xml), and `build`, plus a committed dist/ and a
# .node-version file (or pass node-version-file).
name: Continuous integration

on:
  workflow_call:
    inputs:
      node-version-file:
        description: File the Node version is read from (passed to setup-node).
        required: false
        default: .node-version
        type: string

# granted per job
permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm

      - name: Install packages
        run: npm ci
      - name: Lint
        run: npm run check
      - name: Check types
        run: npm run typecheck
      - name: Test
        run: npm run test:coverage
      - name: Build
        run: npm run build

      - name: Verify dist/ is up to date
        run: git diff --exit-code -- dist

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/cobertura-coverage.xml
          if-no-files-found: error

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: test-report.junit.xml
          if-no-files-found: error

  coverage:
    needs: check
    if: ${{ !cancelled() && needs.check.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report

      - name: Upload coverage reuport
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: cobertura-coverage.xml
          disable_search: true
          fail_ci_if_error: true

      - name: Download test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-results

      - name: Upload test results
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          # the artifact holds only this one file; don't let the action walk the tree
          files: test-report.junit.xml
          disable_search: true
          fail_ci_if_error: true
