# actionlint validates against the workflow schema as of its release; ignore
# findings that are newer-GitHub-feature false positives, scoped to the exact
# message so anything else still fails the gate.
paths:
  .github/workflows/**/*.yaml:
    ignore:
      # `concurrency.queue` shipped 2026-05-07 ("Actions concurrency groups now
      # allow larger queues" changelog); actionlint v1.7.12 — the latest release,
      # 2026-03-30 — predates it. Drop this once actionlint learns the key.
      - 'unexpected key "queue" for "concurrency" section'
