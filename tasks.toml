#
# github-workflows' repo-local tasks. This file is included after the
# markdown-lib archetype, so the lint redefinition below wins: this repo is
# nothing but workflows, so the canonical lint also runs actionlint and zizmor
# on top of the archetype's license + prose checks.

[lint]
description = "prose lint + license check + workflow lint (actionlint, zizmor)"
run = [
  { task = "license-check" },
  { task = "lint-prose" },
  { task = "actionlint" },
  "zizmor .github examples",
]
