#
# github-workflows consumes the shared toolchain (bitwise-media-group/toolchain)
# as the .mise/ submodule: pinned tools + the markdown-lib task archetype come
# from there, and the Makefile is a thin forwarder (.mise/mise.mk). zizmor is
# the one repo-local tool (workflow security lint); repo-local tasks live in
# tasks.toml (included after the archetype so its lint redefinition wins).

[tools]
"aqua:zizmorcore/zizmor" = "1.26.1"

[task_config]
includes = [".mise/tasks/markdown-lib.toml", "tasks.toml"]
